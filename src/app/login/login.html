<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Iniciar Sesion</h1>
      <p class="subtitle">Accede a tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">Correo Electronico</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
          </span>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            class="form-input"
            placeholder="tu@correo.com"
            required
          />
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">Contrasena</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.02c2.05 0 3.71 1.66 3.71 3.71s-1.66 3.71-3.71 3.71S8.29 8.98 8.29 6.93 9.95 3.22 12 3.22zm0 10.29c2.76 0 5.14.65 6.86 1.72-.3 2.94-2.48 5.41-5.34 6.29-2.86-.88-5.04-3.35-5.34-6.29 1.72-1.07 4.1-1.72 6.86-1.72z"/>
            </svg>
          </span>
          <input
            id="password"
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            name="password"
            class="form-input"
            placeholder="Tu contrasena"
            required
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            tabindex="-1"
          >
            <svg *ngIf="hidePassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            <svg *ngIf="!hidePassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11.83 9L15.29 5.54c1.71 1.97 2.71 4.56 2.71 7.46 0 .88-.1 1.74-.29 2.58L19.54 9c1.38-1.73 2.46-3.73 3.04-5.96-.5-.35-1.03-.67-1.6-.92.62 2.03 1.29 3.73 2.65 5.8-1.66 2.04-4.35 3.74-7.31 4.2l2.61 2.61c1.6-.3 3.06-.85 4.26-1.67-2.67 2.04-5.81 3.12-8.88 2.11l7.05 7.05-1.41 1.41L9.41 20.84 8 22.25 6.59 20.84 4.54 22.89 3.13 21.48 9 15.41C6.03 14.88 3.34 13.17 1.71 10.67c1.66-2.04 4.35-3.74 7.3-4.2l-2.61-2.61c-1.6.3-3.06.85-4.26 1.67 2.67-2.04 5.81-3.12 8.88-2.11l-7.05-7.05 1.41-1.41L14.59 3.16 16 1.75l1.41 1.41 2.05-2.05 1.41 1.41L15.41 8.59z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesion</span>
        <span *ngIf="isLoading" class="loading-text">Cargando...</span>
      </button>
    </form>

    <div class="login-footer">
      <p>No tienes cuenta? <a href="#">Registrate aqui</a></p>
    </div>
  </div>
</div>
